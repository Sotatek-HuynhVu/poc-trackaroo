name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: true

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: pnpm build

      - name: Deploy to server
        run: |
          DEPLOY_DIR=/home/sotatek/trackaroo-poc/trackaroo-be
          mkdir -p $DEPLOY_DIR

          rsync -azh --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.claude' \
            ./ $DEPLOY_DIR/

          # Write env file
          if [ -n "${{ secrets.ENV_FILE_CONTENT }}" ]; then
            echo "${{ secrets.ENV_FILE_CONTENT }}" > $DEPLOY_DIR/.env
          else
            cp $DEPLOY_DIR/.env.example $DEPLOY_DIR/.env
            sed -i 's|localhost|postgres|g' $DEPLOY_DIR/.env
          fi

          cd $DEPLOY_DIR

          echo "🔨 Building image..."
          docker compose build api

          echo "🚀 Starting postgres..."
          docker compose up -d postgres

          echo "⏳ Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U trackaroo > /dev/null 2>&1; then
              echo "✅ DB ready"
              break
            fi
            sleep 1
          done

          echo "🔄 Running migrations..."
          docker compose run --rm api npx prisma migrate deploy

          echo "⏳ Waiting for migration container cleanup..."
          sleep 5

          echo "🚀 Starting API..."
          docker compose up -d api

          echo "⏳ Waiting for API to be healthy..."
          sleep 5

          echo "📋 Container status:"
          docker compose ps

          echo "📜 API logs (last 20 lines):"
          docker compose logs --tail=20 api || true
