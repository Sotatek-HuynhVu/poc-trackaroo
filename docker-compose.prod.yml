services:
  api:
    # Replace with your actual ghcr.io image before deploying
    image: ghcr.io/OWNER/REPO:latest
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
